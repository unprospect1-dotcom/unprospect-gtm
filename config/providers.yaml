# Configuración de proveedores de list building y enriquecimiento.
# Los skills gtm-lists-aiark y gtm-prospeo leen este archivo al arrancar.
# Cambia valores aquí — no en los skills ni en los scripts.

defaults:
  workspace: unprospect
  output_dir: lists/              # los CSVs generados caen en lists/<workspace>/
  sample_size: 25                 # tamaño de la muestra de aprobación antes de exportar en grande
  dedupe:
    against_outreach_log: true    # excluir leads ya contactados (Supabase outreach_log)
    recontact_after_days: 90      # antes de esto un lead contactado se excluye siempre

aiark:
  env_key: AI_ARK_API             # nombre de la env var con el API key (header X-TOKEN)
  base_url: https://api.ai-ark.com/api/developer-portal/v1
  rate_limit_rps: 4               # el límite real es 5 rps / 300 rpm — dejamos margen
  page_size: 100                  # máximo por página en search
  # OJO (verificado 2026-07-13): el search NO es gratis — cobra 0.5 créditos por
  # perfil devuelto. Sondear totales con size:1 y nunca paginar resultados que
  # no se van a usar. Para conteos masivos usar GetLeads count (gratis).
  # Saldo: GET /payments/credits (path verificado; /credit da 401).
  export:
    max_size: 10000               # máximo por job de export con email
    verified_only: true           # true = solo SMTP verificado; false = incluir CATCH_ALL
    poll_seconds: 30              # cada cuánto consultar estadísticas del job async
  exclusion_lists:
    enabled: true                 # subir dominios/IDs ya contactados como lista de exclusión
    max_items: 10000              # límite de AI Ark por lista (expiran a las 24h)
  lookalike:
    max_domains: 5                # límite del filtro lookalikeDomains

prospeo:
  env_key: PROSPEO_KEY            # nombre de la env var con el API key (header X-KEY)
  base_url: https://api.prospeo.io
  rate_limit_rps: 2               # límite real 2–2.5 rps
  search:
    page_size: 25                 # fijo de la API
    max_results_per_search: 25000 # límite duro; arriba de esto se parte por estado/geo
    verified_email_only: true     # person_contact_details.email = ["VERIFIED"]
    hide_already_exported: true   # person_duplicate_control
  enrich:
    only_verified_email: true
    enrich_mobile: false          # 10 créditos por mobile — activar solo a propósito
    bulk_size: 50                 # máximo del endpoint bulk
    # Costo: 1 crédito por email verificado encontrado; NO_MATCH no cobra;
    # re-enriquecer el mismo lead es gratis por 90 días.

ocean:
  env_key: OCEAN_API              # nombre de la env var con el API key (header x-api-token)
  base_url: https://api.ocean.io  # search vive en /v3, reveal/warmup/enrich/credits en /v2
  rate_limit_rpm: 60              # límite self-serve: 60 req/min y 1,000 req/día
  daily_request_limit: 1000
  credit_budget:
    max_per_run: 800              # tope duro de créditos por corrida — el skill NUNCA lo excede sin aprobación
    reserve: 500                  # nunca dejar el saldo debajo de esto
    # Economía MEDIDA (2026-07-14): 0.2 créditos por resultado de company search
    # (1,120 lookalikes = 226 créditos, creditsUsed confirmado en el response).
    # Email revelado: 1 crédito (por verificar en corrida real). El response de
    # search trae `total` — una muestra de size 10 (2 créditos) revela el universo.
  lookalike:
    max_domains: 10               # seeds por búsqueda lookalike
    mode: precise                 # precise = similitud semántica de producto/servicio; broad = misma industria
    warmup_seeds: true            # validar seeds con /v2/warmup/companies (GRATIS) antes de buscar
  search:
    count_probe_size: 1           # size:1 primero para ver el total (~0.2 créditos en company search)
    page_size: 50                 # por página vía cursor searchAfter
  reveal:
    batch: true                   # reveal por lote de person ids; async, 1 crédito por email verificado

getleads:
  env_key: GETLEADS_API           # nombre de la env var con el API key (Authorization: Bearer glb_live_…)
  base_url: https://app.getleads.io/api/v1
  rate_limit_rpm: 100             # 100 req/min global; 429 al excederse
  credit_budget:
    max_per_run: 1000             # tope duro de créditos por corrida sin aprobación
    reserve: 1000                 # nunca dejar el saldo debajo de esto
    # Economía (verificada 2026-07-13): 1 crédito por registro devuelto /
    # ítem exitoso de enrich; 0 si no hay match. GRATIS: count, filter-values,
    # health. No hay endpoint de saldo — creditsRemaining viene en los counts.
  search:
    max_limit: 50000              # máximo por request en search/export
    default_sample: 25            # muestra de aprobación (= defaults.sample_size)
    max_per_company: 2            # default para estructura por empresa en exports
  export:
    poll_seconds: 20              # polling del export asíncrono (CSV en S3, expira 24h)
  enrich:
    batch_size: 100               # máximo por request en enrich/*

# Columnas estándar del CSV de salida — el contrato con gtm-check-contact,
# gtm-personalize y el upload a Instantly. Todo proveedor mapea a esto.
csv_schema:
  - email
  - first_name
  - last_name
  - job_title
  - seniority
  - linkedin_url
  - company_name
  - company_domain
  - company_linkedin
  - company_industry
  - company_headcount
  - company_location
  - email_status        # VERIFIED | CATCH_ALL | UNKNOWN
  - source              # aiark | prospeo | ocean | getleads | user
  - source_id           # id del proveedor para re-consultas

name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Claude Code and Codex skill parity
        run: python scripts/check_agent_compat.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Compile Python sources
        run: python -m compileall -q .
